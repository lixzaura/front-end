<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Layout com Flexbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <h1>Meu Site</h1>
    <nav class="menu">
      <a href="#">Home</a>
      <a href="#">Sobre</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <main class="container">
    
    <aside class="sidebar">
      <h2>Menu Lateral</h2>
      <p>Links e informações</p>
    </aside>

    <section class="conteudo">
      <h2>Conteúdo</h2>

      <div class="cards">
        <div class="card">Card 1</div>
        <div class="card destaque">Card 2</div>
        <div class="card">Card 3</div>
        <div class="card">Card 4</div>
      </div>

    </section>

  </main>

  <footer class="footer">
    <p>© 2026 - Meu Site</p>
  </footer>

</body>
</html>
